version: '3.8'

services:
  # ─── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: safety-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: safety_monitor
    volumes:
      - mongo_data:/data/db
    networks:
      - safety-net

  # ─── Node.js Backend ─────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: safety-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/safety_monitor
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_min_32_chars}
      JWT_EXPIRE: 7d
      AI_SERVICE_URL: http://ai-service:8000
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongo
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/logs:/app/logs
    networks:
      - safety-net

  # ─── Python AI Service ───────────────────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: safety-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MODEL_TYPE: mock   # Change to 'pytorch' or 'huggingface' with real model
      PORT: 8000
      HOST: 0.0.0.0
    volumes:
      - ./ai-service/model:/app/model
    networks:
      - safety-net

  # ─── React Frontend (served by nginx) ────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
        VITE_SOCKET_URL: http://localhost:5000
    container_name: safety-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - safety-net

networks:
  safety-net:
    driver: bridge

volumes:
  mongo_data:
